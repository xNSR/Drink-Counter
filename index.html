<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>American Beverage Tracker — Mobile Optimized</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  /* GLOBAL */
  body {
    margin: 0;
    background: radial-gradient(circle at top, #1b2a4a 0, #050816 55%, #000 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #f5f5f5;
    -webkit-tap-highlight-color: transparent;
  }

  h1 {
    text-align: center;
    margin: 16px 0 6px;
    font-size: clamp(20px, 5vw, 28px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #00eaff;
    text-shadow: 0 0 12px #00eaff;
  }

  .subtitle {
    text-align: center;
    font-size: clamp(11px, 3vw, 14px);
    opacity: 0.8;
    margin-bottom: 12px;
    padding: 0 12px;
  }

  /* CONTAINER */
  .container {
    width: 100%;
    max-width: 1000px;
    margin: 0 auto 30px;
    background: linear-gradient(145deg, #0b1020, #151a30);
    padding: clamp(12px, 3vw, 18px);
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.18);
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    border: 1px solid rgba(0, 255, 255, 0.4);
    filter: blur(2px);
    animation: borderPulse 3s infinite alternate;
    pointer-events: none;
  }

  @keyframes borderPulse {
    from { opacity: 0.4; }
    to { opacity: 1; }
  }

  /* GRID — MOBILE FIRST */
  .grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  @media (min-width: 760px) {
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
    }
  }

  /* CARD */
  .card {
    background: radial-gradient(circle at top left, #1b2340 0, #0b1020 55%);
    border-radius: 14px;
    padding: clamp(10px, 3vw, 14px);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: clamp(6px, 2vw, 10px);
  }

  .card-title {
    font-size: clamp(11px, 3vw, 13px);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    opacity: 0.9;
  }

  .chip {
    font-size: clamp(9px, 2.5vw, 10px);
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid rgba(0, 255, 255, 0.6);
    color: #00eaff;
    background: rgba(0, 255, 255, 0.08);
  }

  /* INPUTS */
  label {
    display: block;
    margin-top: 8px;
    font-size: clamp(10px, 2.5vw, 11px);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.8;
  }

  select {
    width: 100%;
    margin-top: 4px;
    padding: clamp(8px, 2.5vw, 10px);
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(5, 8, 20, 0.9);
    color: #f5f5f5;
    font-size: clamp(12px, 3vw, 14px);
    outline: none;
    transition: 0.18s;
  }

  select:focus {
    border-color: #00eaff;
    box-shadow: 0 0 0 1px rgba(0, 234, 255, 0.6);
    transform: translateY(-1px);
  }

  .row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }

  @media (max-width: 480px) {
    .row {
      flex-direction: column;
    }
  }

  /* BUTTONS */
  button {
    border: none;
    border-radius: 999px;
    padding: clamp(9px, 3vw, 12px);
    font-size: clamp(11px, 3vw, 13px);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #00eaff, #00ff9d);
    color: #050816;
    box-shadow: 0 0 14px rgba(0, 255, 255, 0.5);
    transition: 0.16s;
    width: 100%;
  }

  button:hover {
    transform: translateY(-1px) scale(1.03);
    box-shadow: 0 0 22px rgba(0, 255, 255, 0.8);
  }

  button:active {
    transform: translateY(1px) scale(0.97);
  }

  .btn-secondary {
    background: transparent;
    color: #00eaff;
    border: 1px solid rgba(0, 234, 255, 0.7);
    box-shadow: none;
  }

  /* LOG LIST */
  #logList {
    margin-top: 8px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .entry {
    background: rgba(5, 8, 20, 0.9);
    border-radius: 10px;
    padding: clamp(8px, 3vw, 10px);
    margin-bottom: 6px;
    border-left: 3px solid #00eaff;
    font-size: clamp(11px, 3vw, 12px);
    animation: fadeIn 0.35s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .stat-pill {
    border-radius: 999px;
    padding: clamp(8px, 3vw, 10px);
    background: rgba(5, 8, 20, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.06);
    font-size: clamp(10px, 2.5vw, 11px);
  }

  .stat-value {
    font-size: clamp(12px, 3vw, 14px);
    font-weight: 600;
  }

  /* BURST ANIMATION */
  .burst {
    position: fixed;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0, 255, 255, 0.9), transparent);
    animation: burstAnim 0.6s ease-out forwards;
    z-index: 9999;
  }

  @keyframes burstAnim {
    from { transform: scale(0.1); opacity: 1; }
    to { transform: scale(2.5); opacity: 0; }
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: clamp(10px, 2.5vw, 11px);
    opacity: 0.7;
    margin-bottom: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 12px;
  }
</style>
</head>

    <!-- RIGHT SIDE -->

</div>

<div class="footer">Mobile‑friendly • Real brands • Full nutrition</div>
